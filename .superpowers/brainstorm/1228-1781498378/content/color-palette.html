<h2>🎨 清新治愈风 — 配色方案</h2>
<p class="subtitle">两种方向，你倾向哪个？</p>

<div class="options" style="grid-template-columns: 1fr 1fr;">

  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>暖杏治愈</h3>
      <p>暖色调基底，像午后阳光</p>
      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">
        <span style="display:inline-block;width:48px;height:48px;border-radius:12px;background:#FFF8F0;border:2px solid #F5E6D3;" title="背景 #FFF8F0"></span>
        <span style="display:inline-block;width:48px;height:48px;border-radius:12px;background:#FFFFFF;border:2px solid #E8E0D8;" title="卡片 #FFFFFF"></span>
        <span style="display:inline-block;width:48px;height:48px;border-radius:12px;background:#FF8A65;border:2px solid transparent;" title="主色 #FF8A65 珊瑚橙"></span>
        <span style="display:inline-block;width:48px;height:48px;border-radius:12px;background:#81C784;border:2px solid transparent;" title="辅助色 #81C784 嫩绿"></span>
        <span style="display:inline-block;width:48px;height:48px;border-radius:12px;background:#64B5F6;border:2px solid transparent;" title="点缀色 #64B5F6 天蓝"></span>
      </div>
      <div class="pros-cons" style="margin-top:8px;">
        <div class="pros"><ul><li>温暖亲切</li><li>适合个人主页</li><li>视觉疲劳低</li></ul></div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>薄荷清爽</h3>
      <p>冷色调基底，像清晨露水</p>
      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">
        <span style="display:inline-block;width:48px;height:48px;border-radius:12px;background:#F0F9F7;border:2px solid #DCE8E4;" title="背景 #F0F9F7"></span>
        <span style="display:inline-block;width:48px;height:48px;border-radius:12px;background:#FFFFFF;border:2px solid #E0EDE8;" title="卡片 #FFFFFF"></span>
        <span style="display:inline-block;width:48px;height:48px;border-radius:12px;background:#4DB6AC;border:2px solid transparent;" title="主色 #4DB6AC 薄荷绿"></span>
        <span style="display:inline-block;width:48px;height:48px;border-radius:12px;background:#FFB74D;border:2px solid transparent;" title="辅助色 #FFB74D 暖黄"></span>
        <span style="display:inline-block;width:48px;height:48px;border-radius:12px;background:#CE93D8;border:2px solid transparent;" title="点缀色 #CE93D8 淡紫"></span>
      </div>
      <div class="pros-cons" style="margin-top:8px;">
        <div class="pros"><ul><li>清新干净</li><li>有呼吸感</li><li>现代感强</li></ul></div>
      </div>
    </div>
  </div>

</div>

<div class="section">
  <p style="color:var(--muted);font-size:14px;">💡 无论选哪个，都会把当前暗色/青色极客风完全替换掉。</p>
</div>
