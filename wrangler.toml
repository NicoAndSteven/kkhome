name = "personal-homepage"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

# D1 数据库 — 使用前创建：
#   npx wrangler d1 create kkhome_wishes
# 然后把 database_id 替换为实际 ID
[[d1_databases]]
binding = "WISHES_DB"
database_name = "kkhome_wishes"
database_id = "0993bece-5500-41e7-9b2f-4bde874e8073"

# Future platform bindings:
# [[kv_namespaces]]
# binding = "HUB_KV"
# id = "<replace-with-kv-namespace-id>"

[[r2_buckets]]
binding = "MUSIC_BUCKET"
bucket_name = "music"

# 管理员密码 — 在 Cloudflare Pages Dashboard 中设置
# Settings → Environment variables → Add MUSIC_ADMIN_TOKEN
# 登录时输入此密码即可获得管理员权限
# MUSIC_ADMIN_TOKEN = "your-admin-password-here"

# [[vectorize]]
# binding = "HUB_VECTORIZE"
# index_name = "kkhome-tools"

# [[queues.producers]]
# binding = "HUB_QUEUE"
# queue = "kkhome-jobs"

# [ai]
# binding = "AI"

# [[durable_objects.bindings]]
[[durable_objects.bindings]]
name = "PARTY_ROOMS"
class_name = "PartyRoom"
script_name = "kkhome-party-rooms"
